<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拍卖师考试 · 复习练习系统</title>
<style>
/* ===== 全局变量与基础样式 ===== */
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --card: #1e2a4a;
  --card2: #253456;
  --text: #e0e0e0;
  --text2: #a0a0b8;
  --accent: #e94560;
  --accent2: #f0a500;
  --green: #4ecca3;
  --blue: #3498db;
  --purple: #9b59b6;
  --red: #e74c3c;
  --orange: #e67e22;
  --border: #2a3a5c;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
  --radius: 12px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ===== 顶部导航 ===== */
header {
  background: linear-gradient(135deg, var(--bg2), var(--bg3));
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--accent);
  position: sticky; top:0; z-index:100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.4);
}
header h1 { font-size:1.4em; color:#fff; }
header h1 span { color:var(--accent); }
nav { display:flex; gap:8px; flex-wrap:wrap; }
nav button {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.9em;
  transition: var(--transition);
  white-space: nowrap;
}
nav button:hover { border-color: var(--accent); color: #fff; }
nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== 主容器 ===== */
main { max-width:1100px; margin:0 auto; padding:20px 16px 40px; }

/* ===== 面板容器 ===== */
.panel { display:none; }
.panel.active { display:block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

/* ===== 筛选栏 ===== */
.filter-bar {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  background: var(--card); padding: 16px 20px; border-radius: var(--radius);
  margin-bottom: 20px; box-shadow: var(--shadow);
}
.filter-bar label { font-size:0.85em; color:var(--text2); white-space:nowrap; }
.filter-bar select, .filter-bar input[type="number"] {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  padding: 7px 12px; border-radius: 8px; font-size:0.9em; outline:none;
}
.filter-bar select:focus { border-color: var(--accent); }
.filter-bar .btn-group { display:flex; gap:6px; flex-wrap:wrap; }
.filter-bar .btn-sm {
  background: var(--bg); color: var(--text2); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 16px; cursor: pointer; font-size:0.8em;
  transition: var(--transition);
}
.filter-bar .btn-sm:hover { border-color: var(--accent); color:#fff; }
.filter-bar .btn-sm.on { background: var(--accent); color:#fff; border-color: var(--accent); }
.filter-bar .btn-star.on { background: var(--accent2); color: #1a1a2e; border-color: var(--accent2); }

/* ===== 进度条 ===== */
.progress-wrap {
  background: var(--card); padding: 12px 20px; border-radius: var(--radius);
  margin-bottom: 16px; display:flex; align-items:center; gap:14px;
  box-shadow: var(--shadow);
}
.progress-wrap span { font-size:0.85em; color:var(--text2); white-space:nowrap; }
.progress-bar {
  flex:1; height:8px; background:var(--bg); border-radius:4px; overflow:hidden;
}
.progress-fill { height:100%; background:var(--green); border-radius:4px; transition:width 0.5s; }

/* ===== 题目卡片 ===== */
.q-card {
  background: var(--card); border-radius: var(--radius); padding: 24px;
  margin-bottom: 16px; box-shadow: var(--shadow); border-left:4px solid transparent;
  transition: var(--transition);
}
.q-card.wrong { border-left-color: var(--red); }
.q-card.hesitate { border-left-color: var(--orange); }
.q-card.correct { border-left-color: var(--green); }
.q-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.q-badges { display:flex; gap:6px; flex-wrap:wrap; }
.q-badge {
  font-size:0.7em; padding:3px 10px; border-radius:10px; font-weight:bold; white-space:nowrap;
}
.q-badge.subject { background:var(--bg3); color:var(--blue); }
.q-badge.chapter { background:var(--bg3); color:var(--purple); }
.q-badge.type { background:var(--bg3); color:var(--orange); }
.q-badge.star { background:var(--accent2); color:#1a1a2e; }
.q-number { color:var(--accent); font-weight:bold; font-size:0.9em; }
.q-title { font-size:1.1em; margin-bottom:16px; color:#fff; line-height:1.6; }
.q-options { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.q-option {
  background: var(--bg); padding: 10px 16px; border-radius: 8px; cursor: pointer;
  border: 2px solid transparent; transition: var(--transition); font-size:0.95em;
  display:flex; align-items:center; gap:10px;
}
.q-option:hover { border-color:var(--blue); background:var(--bg2); }
.q-option.selected { border-color:var(--blue); background:var(--bg3); }
.q-option.correct-answer { border-color:var(--green); background:rgba(78,204,163,0.15); }
.q-option.wrong-answer { border-color:var(--red); background:rgba(231,76,60,0.15); }
.q-option input[type="radio"], .q-option input[type="checkbox"] { accent-color:var(--accent); flex-shrink:0; }
.q-check-area { display:flex; gap:10px; align-items:center; margin-bottom:12px; }
.q-check-area button {
  padding: 8px 20px; border-radius: 20px; border:none; cursor:pointer;
  font-size:0.9em; font-weight:bold; transition:var(--transition);
}
.btn-check { background:var(--blue); color:#fff; }
.btn-check:hover { opacity:0.85; }
.btn-show { background:var(--accent2); color:#1a1a2e; }
.btn-show:hover { opacity:0.85; }

.q-feedback { padding:12px 16px; border-radius:8px; margin-top:12px; display:none; font-size:0.9em; }
.q-feedback.show { display:block; }
.q-feedback.correct { background:rgba(78,204,163,0.15); border:1px solid var(--green); }
.q-feedback.wrong { background:rgba(231,76,60,0.15); border:1px solid var(--red); }

.self-assess { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; align-items:center; }
.self-assess span { font-size:0.85em; color:var(--text2); }
.self-assess button {
  padding: 6px 16px; border-radius: 16px; border:1px solid var(--border);
  background:transparent; color:var(--text2); cursor:pointer;
  font-size:0.8em; transition:var(--transition);
}
.self-assess button:hover { border-color:var(--accent); color:#fff; }
.self-assess button.rate-wrong:hover, .self-assess button.rate-wrong.active { background:var(--red); color:#fff; border-color:var(--red); }
.self-assess button.rate-hesitate:hover, .self-assess button.rate-hesitate.active { background:var(--orange); color:#fff; border-color:var(--orange); }
.self-assess button.rate-correct:hover, .self-assess button.rate-correct.active { background:var(--green); color:#fff; border-color:var(--green); }

.note-input { width:100%; margin-top:10px; }
.note-input textarea {
  width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);
  border-radius:8px; padding:10px; font-size:0.85em; resize:vertical; min-height:60px;
  font-family: inherit;
}
.note-input select {
  background:var(--bg); color:var(--text); border:1px solid var(--border);
  padding:6px 10px; border-radius:8px; margin-right:8px; font-size:0.85em;
}
.note-input button {
  background:var(--accent); color:#fff; border:none; padding:6px 16px; border-radius:16px;
  cursor:pointer; font-size:0.85em; margin-top:6px;
}

/* ===== 翻页 ===== */
.pagination { display:flex; gap:10px; justify-content:center; margin-top:20px; align-items:center; }
.pagination button {
  background:var(--card); color:var(--text); border:1px solid var(--border);
  padding:8px 20px; border-radius:20px; cursor:pointer; transition:var(--transition);
}
.pagination button:hover:not(:disabled) { border-color:var(--accent); }
.pagination button:disabled { opacity:0.4; cursor:default; }
.pagination span { color:var(--text2); font-size:0.9em; }

/* ===== 错题本 ===== */
.error-stats {
  display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:14px; margin-bottom:20px;
}
.error-stat {
  background:var(--card); padding:18px; border-radius:var(--radius);
  text-align:center; box-shadow:var(--shadow);
}
.error-stat .num { font-size:2.2em; font-weight:bold; color:var(--accent); }
.error-stat .label { font-size:0.8em; color:var(--text2); margin-top:4px; }
.root-cause-chart { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.root-cause-item {
  background:var(--card); padding:12px 18px; border-radius:var(--radius);
  display:flex; align-items:center; gap:10px;
}
.root-cause-item .color-dot { width:12px; height:12px; border-radius:50%; }
.root-cause-item .count { font-weight:bold; font-size:1.2em; }

/* ===== 统计面板 ===== */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:16px; }
.stat-module {
  background:var(--card); padding:20px; border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.stat-module h3 { margin-bottom:12px; color:var(--accent2); font-size:1em; }
.stat-module .stat-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.85em; }
.stat-module .stat-row:last-child { border:none; }
.stat-bar-wrap { flex:1; height:6px; background:var(--bg); border-radius:3px; margin-left:10px; max-width:120px; }
.stat-bar-fill { height:100%; border-radius:3px; transition:width 0.5s; }

/* ===== 响应式 ===== */
@media (max-width:768px) {
  header { flex-direction:row; flex-wrap:wrap; gap:8px; }
  header h1 { font-size:1.1em; }
  nav button { padding:6px 10px; font-size:0.75em; }
  .filter-bar { flex-direction:column; align-items:stretch; }
  .q-card { padding:16px; }
  .stats-grid { grid-template-columns:1fr; }
}

/* ===== 登录页 ===== */
.login-overlay {
  position:fixed; inset:0; background:linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 40%, #16213e 100%);
  display:flex; align-items:center; justify-content:center; z-index:9999;
}
.login-box {
  background:var(--card); padding:48px 40px; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
  width:400px; max-width:90vw; text-align:center; border:1px solid var(--border);
}
.login-box h1 {
  font-size:1.8em; color:#fff; margin-bottom:8px; letter-spacing:2px;
}
.login-box h1 .sub { display:block; font-size:0.45em; color:var(--accent); margin-top:4px; letter-spacing:4px; }
.login-box .login-icon { font-size:3em; margin-bottom:16px; }
.login-box input {
  width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border);
  padding:12px 16px; border-radius:10px; font-size:1em; margin-bottom:14px; outline:none;
  transition:var(--transition);
}
.login-box input:focus { border-color:var(--accent); }
.login-box button {
  width:100%; background:var(--accent); color:#fff; border:none; padding:12px;
  border-radius:10px; font-size:1.1em; cursor:pointer; font-weight:bold;
  transition:var(--transition); letter-spacing:2px;
}
.login-box button:hover { opacity:0.85; transform:translateY(-1px); }
.login-box .login-error { color:var(--red); font-size:0.85em; margin-top:8px; min-height:20px; }
.login-box .login-hint { color:var(--text2); font-size:0.75em; margin-top:16px; }

/* ===== 用户信息栏 ===== */
.user-bar {
  display:flex; align-items:center; gap:10px; margin-left:auto;
  font-size:0.85em; color:var(--text2);
}
.user-bar .user-name { color:var(--accent2); font-weight:bold; }
.user-bar .btn-logout {
  background:transparent; color:var(--text2); border:1px solid var(--border);
  padding:4px 12px; border-radius:12px; cursor:pointer; font-size:0.8em;
  transition:var(--transition);
}
.user-bar .btn-logout:hover { border-color:var(--red); color:var(--red); }

/* ===== 管理面板表格 ===== */
.admin-table { width:100%; border-collapse:collapse; margin-top:16px; font-size:0.9em; }
.admin-table th, .admin-table td { padding:10px 14px; border:1px solid var(--border); text-align:left; }
.admin-table th { background:var(--bg3); color:var(--accent2); }
.admin-table td { background:var(--bg); }
.admin-table .btn-sm-del { background:var(--red); color:#fff; border:none; padding:4px 10px; border-radius:8px; cursor:pointer; font-size:0.8em; }
.admin-form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:20px; }
.admin-form input {
  background:var(--bg); color:var(--text); border:1px solid var(--border);
  padding:8px 12px; border-radius:8px; font-size:0.9em; outline:none;
}
.admin-form input:focus { border-color:var(--accent); }
.admin-form button {
  background:var(--accent); color:#fff; border:none; padding:8px 18px;
  border-radius:8px; cursor:pointer; font-size:0.9em;
}

/* ===== 教材查看 ===== */
.book-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; }
.book-card {
  background:var(--card); border-radius:var(--radius); padding:20px; text-align:center;
  box-shadow:var(--shadow); cursor:pointer; transition:var(--transition);
  border:2px solid transparent;
}
.book-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.book-card .book-icon { font-size:2.5em; margin-bottom:10px; }
.book-card .book-name { font-size:0.95em; color:#fff; margin-bottom:4px; }
.book-card .book-type { font-size:0.75em; color:var(--text2); }
.book-card .book-actions { display:flex; gap:6px; justify-content:center; margin-top:10px; }
.book-card .book-actions button { font-size:0.75em; padding:4px 12px; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; transition:var(--transition); }
.book-card .book-actions button:hover { border-color:var(--accent); color:#fff; }

/* ===== 查看器弹窗 ===== */
.viewer-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:10000;
  display:flex; flex-direction:column;
  /* 🔒 禁止文本选择 */
  -webkit-user-select:none; user-select:none;
}
.viewer-toolbar {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 20px; background:var(--bg2); border-bottom:1px solid var(--border);
}
.viewer-toolbar span { color:#fff; font-size:1em; }
.viewer-toolbar button {
  background:transparent; color:#fff; border:1px solid var(--border);
  padding:6px 16px; border-radius:16px; cursor:pointer; font-size:0.9em;
}
.viewer-toolbar button:hover { border-color:var(--red); }
.viewer-body {
  flex:1; display:flex; align-items:center; justify-content:center;
  overflow:auto; padding:20px; position:relative;
  -webkit-user-select:none; user-select:none;
}
/* 🔒 PDF查看器：使用PDF.js canvas渲染，完全掌控右键和滚轮 */
.pdf-canvas-container { width:100%; height:100%; overflow:auto; background:#525659; display:flex; flex-direction:column; align-items:center; padding:10px 0; }
.pdf-canvas-container canvas { display:block; margin:0 auto 8px auto; box-shadow:0 2px 8px rgba(0,0,0,0.5); }
.viewer-body img { max-width:100%; max-height:100%; object-fit:contain; border-radius:8px; }
.viewer-body .viewer-unsupported { text-align:center; color:var(--text2); }
.viewer-body .viewer-unsupported button {
  margin-top:16px; background:var(--accent); color:#fff; border:none;
  padding:10px 24px; border-radius:20px; cursor:pointer; font-size:1em;
}
/* 🔒 查看器水印层（视觉威慑） */
.viewer-watermark {
  position:fixed; inset:0; z-index:10001; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  opacity:0.03; font-size:4em; color:#fff; white-space:nowrap;
  transform:rotate(-25deg); letter-spacing:0.3em;
}
/* 📊 加载进度条（覆盖在canvas上方） */
.viewer-progress {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; color:#fff; padding:40px;
  position:absolute; inset:0; z-index:10; background:rgba(0,0,0,0.7);
}
.viewer-progress-bar {
  width:300px; height:8px; background:var(--border); border-radius:4px; overflow:hidden;
}
.viewer-progress-fill {
  height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:4px; transition:width 0.3s ease; width:0%;
}
.viewer-progress-text { font-size:0.9em; color:var(--text2); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- ==================== 登录页 ==================== -->
<div class="login-overlay" id="loginOverlay" style="display:none;">
  <div class="login-box">
    <div class="login-icon">🔨</div>
    <h1 id="loginTitle">威拍拍卖师秘籍<span class="sub">WEIPAI AUCTIONEER SYSTEM</span></h1>
    <input type="text" id="loginUser" placeholder="请输入账号" autocomplete="off" onkeydown="if(event.key==='Enter')login()">
    <input type="password" id="loginPass" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登 录</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">如需注册新账号，请联系管理员</div>
  </div>
</div>

<!-- ==================== 主应用 ==================== -->
<div id="app-container">

<header>
  <h1>🔨 <span id="headerTitle">威拍拍卖师秘籍</span></h1>
  <div style="display:flex;flex-direction:column;gap:6px;flex:1;align-items:flex-end;">
    <div class="user-bar">
      <span>👤 <span class="user-name" id="displayUser"></span></span>
      <button class="btn-logout" onclick="logout()">退出登录</button>
    </div>
    <nav>
      <button onclick="switchPanel('practice')" class="active" id="nav-practice">📝 练习</button>
      <button onclick="switchPanel('errors')" id="nav-errors">📕 错题本</button>
      <button onclick="switchPanel('stats')" id="nav-stats">📊 统计</button>
      <button onclick="switchPanel('textbooks')" id="nav-textbooks">📚 教材</button>
      <button onclick="switchPanel('admin')" id="nav-admin" style="display:none;">⚙️ 管理</button>
    </nav>
  </div>
</header>

<main>
<!-- ==================== 练习模式 ==================== -->
<div class="panel active" id="panel-practice">
  <div class="filter-bar">
    <label>科目：</label>
    <select id="filterSubject" onchange="applyFilters()">
      <option value="all">全部科目</option>
      <option value="概论">拍卖概论</option>
      <option value="法律">拍卖法律教程</option>
      <option value="实务">拍卖实务</option>
    </select>
    <label>题型：</label>
    <div class="btn-group" id="filterType">
      <button class="btn-sm on" data-type="all" onclick="toggleTypeFilter(this)">全部</button>
      <button class="btn-sm" data-type="single" onclick="toggleTypeFilter(this)">单选</button>
      <button class="btn-sm" data-type="multi" onclick="toggleTypeFilter(this)">多选</button>
      <button class="btn-sm" data-type="case" onclick="toggleTypeFilter(this)">案例分析</button>
      <button class="btn-sm" data-type="essay" onclick="toggleTypeFilter(this)">论述</button>
    </div>
    <button class="btn-sm btn-star" id="btnStarOnly" onclick="toggleStarFilter()">⭐ 仅看重点题</button>
    <label style="margin-left:8px;">数量：</label>
    <input type="number" id="filterCount" value="20" min="5" max="200" style="width:70px;" onchange="applyFilters()">
    <button class="btn-sm" onclick="randomizeQuestions()" style="background:var(--accent);color:#fff;border-color:var(--accent);">🎲 随机抽题</button>
    <button class="btn-sm" onclick="resetAllProgress()" style="background:transparent;color:var(--red);border-color:var(--red);">🔄 重置进度</button>
  </div>

  <div class="progress-wrap">
    <span>📋 当前进度：</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span id="progressText">0 / 0</span>
    <span>✅<span id="countCorrect">0</span></span>
    <span>⚡<span id="countHesitate">0</span></span>
    <span>❌<span id="countWrong">0</span></span>
    <span>⬜<span id="countUnanswered">0</span></span>
  </div>

  <div id="questionContainer"></div>

const API_BASE = '';
let authToken = null;
let appState = { errors: {}, progress: {}, reviewSessions: [] };

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const res = await fetch(API_BASE + path, { ...options, headers: { ...headers, ...options.headers } });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ===== 登录/登出 =====
async function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if (!username || !password) { errEl.textContent = '⚠️ 请输入账号和密码'; return; }

  try {
    const data = await api('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    authToken = data.token;
    currentUser = { username: data.username, isAdmin: data.isAdmin };
    // 持久化登录状态，刷新页面不丢失
    sessionStorage.setItem('authToken', authToken);
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    appState = await loadStateFromServer();

    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app-container').style.display = '';
    document.getElementById('displayUser').textContent = data.username + (data.isAdmin ? ' [管理员]' : '');
    if (data.isAdmin) document.getElementById('nav-admin').style.display = '';

    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').textContent = '';
    init();
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
  }
}

function logout() {
  if (confirm('确定要退出登录吗？')) {
    authToken = null;
    currentUser = null;
    sessionStorage.removeItem('authToken');
    sessionStorage.removeItem('currentUser');
    appState = { errors: {}, progress: {}, reviewSessions: [] };
    document.getElementById('loginOverlay').style.display = '';
    document.getElementById('app-container').style.display = 'none';
    document.getElementById('nav-admin').style.display = 'none';
    shuffleMap = {}; shuffleReverse = {};
    currentQuestions = [];
    switchPanel('practice');
  }
}

// ===== 页面刷新后自动恢复登录 =====
async function tryAutoLogin() {
  const savedToken = sessionStorage.getItem('authToken');
  const savedUser = sessionStorage.getItem('currentUser');
  if (!savedToken || !savedUser) {
    document.getElementById('loginOverlay').style.display = '';
    document.getElementById('app-container').style.display = 'none';
    return;
  }
  // 有 token：立即显示应用，后台验证
  authToken = savedToken;
  currentUser = JSON.parse(savedUser);
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app-container').style.display = '';
  document.getElementById('displayUser').textContent = currentUser.username + (currentUser.isAdmin ? ' [管理员]' : '');
  if (currentUser.isAdmin) document.getElementById('nav-admin').style.display = '';
  init();
  // 后台加载数据
  try {
    appState = await loadStateFromServer();
    updateProgressBar();
  } catch(e) {}
  // 后台验证 token 有效性
  try {
    await api('/api/progress');
  } catch(e) {
    // token 失效，强制退出
    logout();
  }
}

// ===== 进度同步 =====
async function loadStateFromServer() {
  try {
    const [pRes, eRes] = await Promise.all([
      api('/api/progress'),
      api('/api/errors')
    ]);
    return { progress: pRes.progress || {}, errors: eRes.errors || {}, reviewSessions: [] };
  } catch(e) {
    return { errors: {}, progress: {}, reviewSessions: [] };
  }
}

async function saveState() {
  if (!authToken) return;
  // 只同步有变化的 progress 和 errors
  const progressToSync = {};
  for (const [qid, entry] of Object.entries(appState.progress)) {
    if (entry._dirty !== false) { progressToSync[qid] = entry; entry._dirty = false; }
  }
  if (Object.keys(progressToSync).length > 0) {
    try { await api('/api/progress', { method: 'PUT', body: JSON.stringify({ progress: progressToSync }) }); } catch(e) {}
  }
}

async function renderBookGrid() {
  const books = await loadBooksFromServer();
  const grid = document.getElementById('bookGrid');
  if (!grid) return;
  if (books.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text2);grid-column:1/-1;"><p style="font-size:2em;">📭</p><p>暂无教材，请联系管理员上传</p></div>';
    return;
  }
  const typeIcons = { 'pdf': '📄', 'doc': '📝', 'docx': '📝', 'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️' };
  const typeNames = { 'pdf': 'PDF文档', 'doc': 'Word文档', 'docx': 'Word文档', 'jpg': '图片', 'jpeg': '图片', 'png': '图片' };
  let html = '';
  books.forEach(book => {
    const icon = typeIcons[book.type] || '📁';
    html += `<div class="book-card" onclick="openViewer('${book.id}')">`;
    html += `<div class="book-icon">${icon}</div>`;
    html += `<div class="book-name">${escHtml(book.name)}</div>`;
    html += `<div class="book-type">${typeNames[book.type] || book.type} · ${formatSize(book.size || 0)}</div>`;
    html += `</div>`;
  });
  grid.innerHTML = html;
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / 1048576).toFixed(1) + 'MB';
}

// 🔒 Blob URL + AbortController
let currentBlobUrl = null;
let currentAbortController = null;

function openViewer(bookId) {
  if (!authToken) return;
  // 🔧 取消上一个未完成的加载，防止多个进度条并发
  if (currentAbortController) { currentAbortController.abort(); currentAbortController = null; }
  if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

  api('/api/books').then(d => {
    const book = (d.books || []).find(b => b.id === bookId);
    if (!book) return;
    document.getElementById('viewerTitle').textContent = book.name;
    document.getElementById('viewerWatermark').textContent = book.name;
    const body = document.getElementById('viewerBody');
    const ext = (book.type || '').toLowerCase();
    const loadUrl = API_BASE + '/api/books/' + bookId + '/download';
    const fileSize = book.size || 0;

    const controller = new AbortController();
    currentAbortController = controller;

    body.innerHTML = '<div class="viewer-progress"><div class="viewer-progress-bar"><div class="viewer-progress-fill" id="viewerProgressFill"></div></div><div class="viewer-progress-text" id="viewerProgressText">正在连接…</div></div>';
    document.getElementById('viewerOverlay').style.display = 'flex';

    fetch(loadUrl, {
      headers: { 'Authorization': 'Bearer ' + authToken },
      signal: controller.signal
    })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const reader = r.body.getReader();
        const contentLength = parseInt(r.headers.get('Content-Length') || fileSize || 0);
        let received = 0;
        const chunks = [];

        function pump() {
          return reader.read().then(({ done, value }) => {
            if (controller.signal.aborted) throw new DOMException('Aborted', 'AbortError');
            if (done) {
              return new Blob(chunks, { type: r.headers.get('Content-Type') || 'application/pdf' });
            }
            chunks.push(value);
            received += value.length;
            const pct = contentLength > 0 ? Math.round(received / contentLength * 100) : 0;
            const fill = document.getElementById('viewerProgressFill');
            const text = document.getElementById('viewerProgressText');
            if (fill) fill.style.width = pct + '%';
            if (text) {
              const rMB = (received / 1048576).toFixed(1);
              const tMB = contentLength > 0 ? (contentLength / 1048576).toFixed(1) : '?';
              text.textContent = pct + '% — ' + rMB + 'MB / ' + tMB + 'MB';
            }
            return pump();
          });
        }
        return pump();
      })
      .then(blob => {
        if (controller.signal.aborted) return;
        currentBlobUrl = URL.createObjectURL(blob);
        if (ext === 'pdf') {
          // 🔒 使用 PDF.js canvas 渲染（完全掌控右键和滚轮，无需Chrome内置PDF查看器）
          var container = document.createElement('div');
          container.className = 'pdf-canvas-container';
          container.id = 'pdfCanvasContainer';
          container.oncontextmenu = function(){ return false; };
          container.style.flex = '1';
          body.appendChild(container);

          // 配置 PDF.js worker
          if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            pdfjsLib.getDocument(currentBlobUrl).promise.then(function(pdf) {
              var totalPages = pdf.numPages;
              var loadedPages = 0;
              var textEl = document.getElementById('viewerProgressText');
              if (textEl) textEl.textContent = '共 ' + totalPages + ' 页，正在渲染…';

              // 渲染所有页面
              var renderPromises = [];
              for (var pageNum = 1; pageNum <= totalPages; pageNum++) {
                renderPromises.push(
                  pdf.getPage(pageNum).then(function(page) {
                    var scale = 1.0;
                    var viewport = page.getViewport({scale: scale});
                    var canvas = document.createElement('canvas');
                    canvas.style.width = 'auto';
                    canvas.style.maxWidth = '100%';
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    canvas.oncontextmenu = function(){ return false; };
                    container.appendChild(canvas);

                    return page.render({
                      canvasContext: canvas.getContext('2d'),
                      viewport: viewport
                    }).promise.then(function() {
                      loadedPages++;
                      var pct = Math.round(loadedPages / totalPages * 100);
                      var fill = document.getElementById('viewerProgressFill');
                      if (fill) fill.style.width = pct + '%';
                      if (textEl) textEl.textContent = pct + '% — ' + loadedPages + '/' + totalPages + ' 页';
                    });
                  })
                );
              }

              return Promise.all(renderPromises);
            }).then(function() {
              // 渲染完成后隐藏进度条
              var prog = body.querySelector('.viewer-progress');
              if (prog) prog.style.display = 'none';
            }).catch(function(err) {
              body.innerHTML = '<div style="color:var(--red);text-align:center;padding:60px;"><p>❌ PDF加载失败</p><p style="font-size:0.85em;">' + err.message + '</p></div>';
            });
          } else {
            body.innerHTML = '<div style="color:var(--red);text-align:center;padding:60px;"><p>❌ PDF查看器加载失败</p></div>';
          }
        } else if (ext === 'jpg' || ext === 'jpeg' || ext === 'png') {
          body.innerHTML = '<img src="' + currentBlobUrl + '" alt="' + escHtml(book.name) + '" style="pointer-events:none;max-width:100%;max-height:100%;object-fit:contain;" draggable="false">';
        } else {
          body.innerHTML = '<div class="viewer-unsupported"><p>📝 此格式不支持在线预览</p></div>';
        }
      })
      .catch(e => {
        if (e.name === 'AbortError') return;
        body.innerHTML = '<div style="color:var(--red);text-align:center;padding:60px;"><p>❌ 加载失败</p><p style="font-size:0.85em;">' + e.message + '</p></div>';
      });
  });
}

async function uploadBook() {

  const fileInput = document.getElementById('bookFileInput');

  if (!file) { msgEl.innerHTML = '<span style="color:var(--red);">⚠️ 请选择文件</span>'; return; }

    formData.append('file', file);
    formData.append('name', name);
    const headers = {};
    if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
    const res = await fetch(API_BASE + '/api/books/upload', { method: 'POST', headers, body: formData });

// 选项随机排序缓存（仅内存，每次重置/刷新后重新洗牌）
let shuffleMap = {};     // shuffleMap[qid][shuffledPos] = originalPos
let shuffleReverse = {}; // shuffleReverse[qid][originalPos] = shuffledPos

function getShuffledOrder(q) {
  if (!shuffleMap[q.id]) {
    const n = q.options.length;
    const indices = Array.from({ length: n }, (_, i) => i);
    // Fisher-Yates 洗牌
    for (let i = n - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    shuffleMap[q.id] = indices;       // shuffledPos → originalPos
    shuffleReverse[q.id] = Array(n);
    indices.forEach((orig, shuff) => { shuffleReverse[q.id][orig] = shuff; });
  }
  return shuffleMap[q.id];
}

// 全局变量
let currentQuestions = [];
let currentPage = 0;
const PAGE_SIZE = 10;
let typeFilters = ['all'];
let starOnly = false;

// 获取题目状态
function getQStatus(qid) {
  // 只返回状态字符串，而非整个 progress 对象
  const p = appState.progress[qid];

}

function setQStatus(qid, status) {

  appState.progress[qid].status = status;
  appState.progress[qid].time = Date.now();
  appState.progress[qid]._dirty = true;

// 错题管理
function getErrorEntry(qid) {

}

function saveErrorEntry(qid, entry) {

// ===== 筛选逻辑 =====
function getFilteredQuestions() {
  let qs = [...QUESTION_BANK];

  // 科目
  const subj = document.getElementById('filterSubject').value;
  if (subj !== 'all') qs = qs.filter(q => q.subject === subj);

  // 题型
  if (!typeFilters.includes('all')) {
    qs = qs.filter(q => {
      if (typeFilters.includes('single') && q.type === 'single') return true;
      if (typeFilters.includes('multi') && q.type === 'multi') return true;
      if (typeFilters.includes('case') && q.type === 'case') return true;
      if (typeFilters.includes('essay') && q.type === 'essay') return true;
      return false;
    });
  }

  // 重点题
  if (starOnly) qs = qs.filter(q => q.isStar);

  // 🔄 隐藏已做对的题，未做题在前，错题/犹豫在后
  qs = qs.filter(q => {
    const s = appState.progress[q.id]?.status || '';
    return s !== 'correct';  // 正确的隐藏，直到重置进度
  });
  qs.sort((a, b) => {
    const sa = appState.progress[a.id]?.status || '';
    const sb = appState.progress[b.id]?.status || '';
    const rank = { '': 0, 'hesitate': 1, 'wrong': 2 };
    return (rank[sa] || 0) - (rank[sb] || 0);
  });

  return qs;
}

function applyFilters() {
  currentQuestions = getFilteredQuestions();
  currentPage = 0;
  renderQuestions();
  updateProgressBar();
}

function toggleTypeFilter(btn) {
  const type = btn.dataset.type;
  if (type === 'all') {
    typeFilters = ['all'];
    document.querySelectorAll('#filterType .btn-sm').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  } else {
    typeFilters = typeFilters.filter(t => t !== 'all');
    if (typeFilters.includes(type)) {
      typeFilters = typeFilters.filter(t => t !== type);
      btn.classList.remove('on');
    } else {
      typeFilters.push(type);
      btn.classList.add('on');
    }
    if (typeFilters.length === 0) {
      typeFilters = ['all'];
      document.querySelector('#filterType .btn-sm[data-type="all"]').classList.add('on');
    }
  }
  applyFilters();
}

function toggleStarFilter() {
  starOnly = !starOnly;
  const btn = document.getElementById('btnStarOnly');
  if (starOnly) btn.classList.add('on');
  else btn.classList.remove('on');
  applyFilters();
}

function randomizeQuestions() {
  currentQuestions = getFilteredQuestions();
  // Fisher-Yates shuffle
  for (let i = currentQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
  }
  const count = parseInt(document.getElementById('filterCount').value) || 20;
  currentQuestions = currentQuestions.slice(0, count);
  currentPage = 0;
  renderQuestions();
  updateProgressBar();
}

// ===== 渲染题目 =====
function renderQuestions() {
  const container = document.getElementById('questionContainer');
  const pagination = document.getElementById('pagination');

  if (currentQuestions.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text2);"><p style="font-size:2em;">📭</p><p>没有符合条件的题目，请调整筛选条件</p></div>';
    pagination.innerHTML = '';
    return;
  }

  const start = currentPage * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, currentQuestions.length);
  const pageQs = currentQuestions.slice(start, end);

  let html = '';
  pageQs.forEach((q, idx) => {
    const globalIdx = start + idx + 1;
    const status = getQStatus(q.id);
    const errorEntry = getErrorEntry(q.id);

    let cardClass = '';
    if (status === 'wrong') cardClass = 'wrong';
    else if (status === 'hesitate') cardClass = 'hesitate';
    else if (status === 'correct') cardClass = 'correct';

    const typeNames = { single: '单选题', multi: '多选题', case: '案例分析', essay: '论述题' };
    const typeName = typeNames[q.type] || q.type;

    html += `<div class="q-card ${cardClass}" id="q-${q.id}">`;
    html += `<div class="q-header">`;
    html += `<div class="q-badges">`;
    html += `<span class="q-badge subject">${q.subject}</span>`;
    html += `<span class="q-badge chapter">${q.chapter}</span>`;
    html += `<span class="q-badge type">${typeName}</span>`;
    if (q.isStar) html += `<span class="q-badge star">⭐ 重点</span>`;
    html += `</div>`;
    html += `<span class="q-number">#${globalIdx} / ${currentQuestions.length}</span>`;
    html += `</div>`;

    html += `<div class="q-title">${q.title}</div>`;

    // 选项（随机排序）
    if (q.options.length > 0 && (q.type === 'single' || q.type === 'multi')) {
      html += `<div class="q-options">`;
      const labels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const inputType = q.type === 'single' ? 'radio' : 'checkbox';
      const shuffled = getShuffledOrder(q); // shuffledPos → originalPos
      shuffled.forEach((origIdx, shuffIdx) => {
        const opt = q.options[origIdx];
        html += `<div class="q-option" id="opt-${q.id}-${shuffIdx}" onclick="selectOption('${q.id}', ${shuffIdx}, '${q.type}')">`;
        html += `<input type="${inputType}" name="q-${q.id}" value="${shuffIdx}" style="pointer-events:none;flex-shrink:0;">`;
        html += `<span>${labels[shuffIdx]}. ${opt}</span>`;
        html += `</div>`;
      });
      html += `</div>`;

      html += `<div class="q-check-area">`;
      html += `<button class="btn-check" onclick="checkAnswer('${q.id}')">✅ 提交答案</button>`;
      html += `<button class="btn-show" onclick="showAnswer('${q.id}')">💡 显示答案</button>`;
      html += `</div>`;
      html += `<div class="q-feedback" id="fb-${q.id}"></div>`;
    } else {
      // 综合题/论述题——自评
      html += `<div style="color:var(--text2);font-size:0.9em;margin-bottom:12px;">📝 本题为${typeName}，请在纸上作答后对照要点自我评估。</div>`;
      html += `<button class="btn-show" onclick="showAnswer('${q.id}')">💡 显示参考答案要点</button>`;
      html += `<div class="q-feedback" id="fb-${q.id}"></div>`;
    }

    // 自我评估区
    html += `<div class="self-assess" id="sa-${q.id}" style="${status ? '' : 'display:none;'}">`;
    html += `<span>自我评估：</span>`;
    html += `<button class="rate-wrong ${status==='wrong'?'active':''}" onclick="rateQuestion('${q.id}', 'wrong')">❌ 答错</button>`;
    html += `<button class="rate-hesitate ${status==='hesitate'?'active':''}" onclick="rateQuestion('${q.id}', 'hesitate')">⚡ 犹豫</button>`;
    html += `<button class="rate-correct ${status==='correct'?'active':''}" onclick="rateQuestion('${q.id}', 'correct')">✅ 正确</button>`;
    html += `</div>`;

    // 错题笔记区（始终渲染内部元素，通过 display 控制显隐）
    const showNote = (status === 'wrong' || status === 'hesitate');
    html += `<div class="note-input" id="note-${q.id}" style="${showNote ? 'display:block;' : 'display:none;'}">`;
    html += `<select id="cause-${q.id}"><option value="">选择错误根因...</option>`;
    ['概念混淆','遗忘','理解偏差','审题大意','其他'].forEach(c => {
      html += `<option value="${c}" ${errorEntry&&errorEntry.rootCause===c?'selected':''}>${c}</option>`;
    });
    html += `</select>`;
    html += `<textarea id="note-text-${q.id}" placeholder="修正笔记（正确理解是什么）...">${errorEntry ? errorEntry.note || '' : ''}</textarea>`;
    html += `<button onclick="saveErrorNote('${q.id}')">💾 保存到错题本</button>`;
    html += `</div>`;

    html += `</div>`;
  });

  container.innerHTML = html;

  // 分页
  const totalPages = Math.ceil(currentQuestions.length / PAGE_SIZE);
  let pagHtml = '';
  pagHtml += `<button ${currentPage===0?'disabled':''} onclick="goPage(${currentPage-1})">◀ 上一页</button>`;
  pagHtml += `<span>第 ${currentPage+1} / ${totalPages} 页（共 ${currentQuestions.length} 题）</span>`;
  pagHtml += `<button ${currentPage+1>=totalPages?'disabled':''} onclick="goPage(${currentPage+1})">下一页 ▶</button>`;
  pagination.innerHTML = pagHtml;

  // 恢复已显示的答案
  pageQs.forEach(q => {
    if (appState.progress[q.id] && appState.progress[q.id].answerShown) {
      showAnswer(q.id, true);
    }
  });
}

function goPage(page) {
  currentPage = page;
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectOption(qid, oi, type) {
  const optEl = document.getElementById(`opt-${qid}-${oi}`);
  if (!optEl) return;
  const isSelected = optEl.classList.contains('selected');

  if (type === 'single') {
    // 单选：先清除所有选中
    const shuffleOrder = shuffleMap[qid] || [];
    shuffleOrder.forEach((_, shuffIdx) => {
      const el = document.getElementById(`opt-${qid}-${shuffIdx}`);
      if (el) el.classList.remove('selected');
      const inp = document.querySelector(`input[name="q-${qid}"][value="${shuffIdx}"]`);
      if (inp) inp.checked = false;
    });
    // 如果之前未选中，则选中当前；如果已选中，则取消（已在上一步清除）
    if (!isSelected) {
      optEl.classList.add('selected');
      const inp = document.querySelector(`input[name="q-${qid}"][value="${oi}"]`);
      if (inp) inp.checked = true;
    }
  } else {
    // 多选：直接切换
    optEl.classList.toggle('selected');
    const inp = document.querySelector(`input[name="q-${qid}"][value="${oi}"]`);
    if (inp) inp.checked = optEl.classList.contains('selected');
  }
}

function checkAnswer(qid) {
  const q = QUESTION_BANK.find(qq => qq.id === qid);
  if (!q) return;

  const fb = document.getElementById(`fb-${qid}`);
  if (!fb) return;

  const labels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let userAnswerShuffled = [];
  if (q.type === 'single') {
    const sel = document.querySelector(`input[name="q-${qid}"]:checked`);
    if (sel) userAnswerShuffled = [parseInt(sel.value)];
  } else if (q.type === 'multi') {
    const sels = document.querySelectorAll(`input[name="q-${qid}"]:checked`);
    sels.forEach(s => userAnswerShuffled.push(parseInt(s.value)));
  }

  if (userAnswerShuffled.length === 0) {
    fb.className = 'q-feedback wrong show';
    fb.innerHTML = '⚠️ 请先选择答案';
    return;
  }

  // 洗牌索引 → 原始索引
  const userAnswerOrig = userAnswerShuffled.map(si => shuffleMap[qid][si]);
  const correctAnswerOrig = Array.isArray(q.answer) ? q.answer : [q.answer];
  const isCorrect = arraysEqual([...userAnswerOrig].sort(), [...correctAnswerOrig].sort());

  fb.className = `q-feedback ${isCorrect ? 'correct' : 'wrong'} show`;

  // 高亮选项（在洗牌后的位置上）
  const shuffleOrder = shuffleMap[qid] || [];
  shuffleOrder.forEach((origIdx, shuffIdx) => {
    const optEl = document.getElementById(`opt-${qid}-${shuffIdx}`);
    if (!optEl) return;
    optEl.classList.remove('correct-answer', 'wrong-answer');
    if (correctAnswerOrig.includes(origIdx)) optEl.classList.add('correct-answer');
    if (userAnswerShuffled.includes(shuffIdx) && !correctAnswerOrig.includes(origIdx)) optEl.classList.add('wrong-answer');
  });

  if (isCorrect) {
    fb.innerHTML = `🎉 回答正确！${q.explanation ? '<br><small>💡 ' + q.explanation + '</small>' : ''}`;
    if (!getQStatus(qid) || getQStatus(qid) !== 'correct') {
      rateQuestion(qid, 'correct', true);
    }
  } else {
    const correctShuffledLabels = correctAnswerOrig.map(origIdx => labels[shuffleReverse[qid][origIdx]]).join('、');
    fb.innerHTML = `❌ 回答错误。正确答案是 <b>${correctShuffledLabels}</b>。${q.explanation ? '<br><small>💡 ' + q.explanation + '</small>' : ''}`;
    // 自动记录错题到错题本
    rateQuestion(qid, 'wrong', false);
  }

  if (!appState.progress[qid]) appState.progress[qid] = {};
  appState.progress[qid].answerShown = true;
  saveState();
}

function showAnswer(qid, silent) {
  const q = QUESTION_BANK.find(qq => qq.id === qid);
  if (!q) return;

  const fb = document.getElementById(`fb-${qid}`);
  if (!fb) return;

  const labels = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let answerText = '';

  if (q.type === 'single' || q.type === 'multi') {
    const correctAnswerOrig = Array.isArray(q.answer) ? q.answer : [q.answer];
    const correctShuffledLabels = correctAnswerOrig.map(origIdx => labels[shuffleReverse[qid][origIdx]]).join('、');
    answerText = `📌 正确答案：<b>${correctShuffledLabels}</b>`;
  } else {
    answerText = `📌 参考要点：<br>${q.explanation || '（请参阅教材相关内容）'}`;
  }

  fb.className = 'q-feedback correct show';
  fb.innerHTML = answerText;

  // 高亮正确选项（在洗牌后的位置上）
  if (q.type === 'single' || q.type === 'multi') {
    const correctAnswerOrig = Array.isArray(q.answer) ? q.answer : [q.answer];
    correctAnswerOrig.forEach(origIdx => {
      const shuffIdx = shuffleReverse[qid][origIdx];
      const optEl = document.getElementById(`opt-${qid}-${shuffIdx}`);
      if (optEl) optEl.classList.add('correct-answer');
    });
  }

  // 展开自评区
  if (!silent) {
    const sa = document.getElementById(`sa-${qid}`);
    if (sa) sa.style.display = 'flex';
  }

  if (!appState.progress[qid]) appState.progress[qid] = {};
  appState.progress[qid].answerShown = true;
  saveState();
}

function rateQuestion(qid, status, silent) {
  // 更新状态
  setQStatus(qid, status);

  const sa = document.getElementById(`sa-${qid}`);
  if (sa) {
    sa.style.display = 'flex';
    sa.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    const btn = sa.querySelector(`.rate-${status}`);
    if (btn) btn.classList.add('active');
  }

  const note = document.getElementById(`note-${qid}`);
  if (note) {
    if (status === 'wrong' || status === 'hesitate') {
      note.classList.add('show');
      note.style.display = 'block';
    } else if (status === 'correct') {
      note.classList.remove('show');
      note.style.display = 'none';
      // 从错题本移除
      if (getErrorEntry(qid)) removeErrorEntry(qid);
    }
  }

  // 更新卡片样式
  const card = document.getElementById(`q-${qid}`);
  if (card) {
    card.classList.remove('wrong', 'hesitate', 'correct');
    if (status === 'wrong') card.classList.add('wrong');
    else if (status === 'hesitate') card.classList.add('hesitate');
    else if (status === 'correct') card.classList.add('correct');
  }

  updateProgressBar();

  if (!silent) {
    // 自动保存错题
    if (status === 'wrong' || status === 'hesitate') {
      saveErrorNote(qid, true);
    }
  }
}

function saveErrorNote(qid, auto) {
  const noteEl = document.getElementById(`note-text-${qid}`);
  const causeEl = document.getElementById(`cause-${qid}`);
  const q = QUESTION_BANK.find(qq => qq.id === qid);
  if (!q) return;

  const rootCause = causeEl ? causeEl.value : '';
  const note = noteEl ? noteEl.value : '';

  if (auto && !rootCause && !note) {
    // 自动模式且未填写，保留已有笔记不覆盖
    const existing = getErrorEntry(qid);
    if (existing) {
      if (existing.rootCause && existing.rootCause !== '未分类') rootCause = existing.rootCause;
      if (existing.note && existing.note !== '（待补充修正笔记）') note = existing.note;
    }
  }

  const entry = {
    qid,
    subject: q.subject,
    chapter: q.chapter,
    title: q.title,
    type: q.type,
    rootCause: rootCause || '未分类',
    note: note || '（待补充修正笔记）',
    relatedPage: q.relatedPage || '',
  };

  saveErrorEntry(qid, entry);
  updateProgressBar();

  if (!auto) {
    alert('✅ 已保存到错题本！');
  }
}

// ===== 进度条 =====
function updateProgressBar() {
  const qs = currentQuestions.length > 0 ? currentQuestions : getFilteredQuestions();
  const total = qs.length;
  let correct = 0, hesitate = 0, wrong = 0, unanswered = 0;

  qs.forEach(q => {
    const s = getQStatus(q.id);
    if (s === 'correct') correct++;
    else if (s === 'hesitate') hesitate++;
    else if (s === 'wrong') wrong++;
    else unanswered++;
  });

  const done = correct + hesitate + wrong;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('countCorrect').textContent = correct;
  document.getElementById('countHesitate').textContent = hesitate;
  document.getElementById('countWrong').textContent = wrong;
  document.getElementById('countUnanswered').textContent = unanswered;
}

// ===== 错题本渲染 =====
function renderErrorBook() {
  const container = document.getElementById('errorBookContainer');
  const causeFilter = document.getElementById('errorCauseFilter').value;
  const subjectFilter = document.getElementById('errorSubjectFilter').value;

  let errors = Object.values(appState.errors);
  if (causeFilter !== 'all') errors = errors.filter(e => e.rootCause === causeFilter);
  if (subjectFilter !== 'all') errors = errors.filter(e => e.subject === subjectFilter);

  // 错误统计
  const totalErrors = Object.keys(appState.errors).length;
  const causeCount = {};
  Object.values(appState.errors).forEach(e => {
    causeCount[e.rootCause] = (causeCount[e.rootCause] || 0) + 1;
  });

  document.getElementById('errorStats').innerHTML = `
    <div class="error-stat"><div class="num">${totalErrors}</div><div class="label">错题总数</div></div>
    <div class="error-stat"><div class="num">${Object.keys(appState.errors).filter(k => appState.progress[k] && appState.progress[k].status === 'wrong').length}</div><div class="label">❌ 答错</div></div>
    <div class="error-stat"><div class="num">${Object.keys(appState.errors).filter(k => appState.progress[k] && appState.progress[k].status === 'hesitate').length}</div><div class="label">⚡ 犹豫</div></div>
    <div class="error-stat"><div class="num">${Object.values(appState.errors).filter(e => e.note && e.note !== '（待补充修正笔记）').length}</div><div class="label">📝 已做笔记</div></div>
  `;

  const causeColors = { '概念混淆': '#e74c3c', '遗忘': '#f39c12', '理解偏差': '#9b59b6', '审题大意': '#3498db', '其他': '#95a5a6', '未分类': '#7f8c8d' };
  let causeHtml = '';
  for (const [cause, count] of Object.entries(causeCount)) {
    causeHtml += `<div class="root-cause-item"><div class="color-dot" style="background:${causeColors[cause]||'#95a5a6'}"></div><span>${cause}</span><span class="count">${count}</span></div>`;
  }
  document.getElementById('rootCauseChart').innerHTML = causeHtml;

  if (errors.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text2);"><p style="font-size:2em;">🎉</p><p>错题本为空，继续保持！</p></div>';
    return;
  }

  // 按时间倒序
  errors.sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0));

  let html = '';
  errors.forEach(e => {
    const typeNames = { single: '单选', multi: '多选', case: '案例分析', essay: '论述' };
    const status = getQStatus(e.qid);
    const statusIcon = status === 'wrong' ? '❌' : (status === 'hesitate' ? '⚡' : '📌');

    html += `<div class="q-card" style="border-left-color:${status==='wrong'?'var(--red)':'var(--orange)'};">`;
    html += `<div class="q-header">`;
    html += `<div class="q-badges">`;
    html += `<span class="q-badge subject">${e.subject}</span>`;
    html += `<span class="q-badge chapter">${e.chapter}</span>`;
    html += `<span class="q-badge type">${typeNames[e.type]||e.type}</span>`;
    html += `<span class="q-badge" style="background:${causeColors[e.rootCause]||'#95a5a6'};color:#fff;">${e.rootCause}</span>`;
    if (e.relatedPage) html += `<span class="q-badge" style="background:var(--bg3);color:var(--green);">📎 ${e.relatedPage}</span>`;
    html += `</div>`;
    html += `<span style="color:var(--text2);font-size:0.8em;">${new Date(e.savedAt).toLocaleString('zh-CN')}</span>`;
    html += `</div>`;
    html += `<div class="q-title">${statusIcon} ${e.title}</div>`;
    if (e.note) html += `<div style="background:var(--bg);padding:12px;border-radius:8px;font-size:0.9em;color:var(--text2);">📝 ${e.note}</div>`;
    html += `<div style="margin-top:10px;display:flex;gap:8px;">`;
    html += `<button class="btn-sm" onclick="switchToPractice('${e.qid}')">🔄 重新练习</button>`;
    html += `<button class="btn-sm" style="color:var(--red);border-color:var(--red);" onclick="removeErrorEntry('${e.qid}');renderErrorBook();updateProgressBar();">🗑️ 移除</button>`;
    html += `</div>`;
    html += `</div>`;
  });

  container.innerHTML = html;
}

function switchToPractice(qid) {
  // 在练习模式中找到对应题目，重置答题状态以便重新练习
  currentQuestions = [QUESTION_BANK.find(q => q.id === qid)].filter(Boolean);
  currentPage = 0;
  // 清除该题的答案显示状态，避免自动显示答案
  if (appState.progress[qid]) {
    appState.progress[qid].answerShown = false;
    saveState();
  }
  // 清除洗牌缓存，选项顺序重新随机
  delete shuffleMap[qid];
  delete shuffleReverse[qid];
  switchPanel('practice');
  renderQuestions();
}

// ===== 统计面板 =====
function renderStats() {
  // 模块数据
  const modules = [
    { name: '拍卖法律制度', key: '拍卖法律制度', color: 'var(--red)', examPct: 30 },
    { name: '拍卖理论与实务', key: '拍卖理论与实务', color: 'var(--blue)', examPct: 40 },
    { name: '拍卖经济学', key: '拍卖经济学', color: 'var(--purple)', examPct: 15 },
    { name: '职业道德与规范', key: '职业道德与规范', color: 'var(--green)', examPct: 15 },
  ];

  let statsHtml = '';
  modules.forEach(mod => {
    const modQs = QUESTION_BANK.filter(q => q.module === mod.key);
    const total = modQs.length;
    let correct = 0, hesitate = 0, wrong = 0;
    modQs.forEach(q => {
      const s = getQStatus(q.id);
      if (s === 'correct') correct++;
      else if (s === 'hesitate') hesitate++;
      else if (s === 'wrong') wrong++;
    });
    const done = correct + hesitate + wrong;
    const mastery = total > 0 ? Math.round(correct / total * 100) : 0;

    statsHtml += `<div class="stat-module">`;
    statsHtml += `<h3 style="color:${mod.color};">${mod.name} <small style="color:var(--text2);">（考试占比 ~${mod.examPct}%）</small></h3>`;
    statsHtml += `<div class="stat-row"><span>总题数</span><span>${total}</span></div>`;
    statsHtml += `<div class="stat-row"><span>已完成</span><span>${done}</span><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${total>0?Math.round(done/total*100):0}%;background:var(--blue);"></div></div></div>`;
    statsHtml += `<div class="stat-row"><span>✅ 掌握</span><span>${correct}</span><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${total>0?Math.round(correct/total*100):0}%;background:var(--green);"></div></div></div>`;
    statsHtml += `<div class="stat-row"><span>掌握率</span><span><b>${mastery}%</b></span></div>`;
    statsHtml += `</div>`;
  });

  document.getElementById('statsGrid').innerHTML = statsHtml;

  // 模块掌握率
  let masteryHtml = '';
  modules.forEach(mod => {
    const modQs = QUESTION_BANK.filter(q => q.module === mod.key);
    const total = modQs.length;
    const correct = modQs.filter(q => getQStatus(q.id) === 'correct').length;
    const done = modQs.filter(q => ['correct','hesitate','wrong'].includes(getQStatus(q.id)||'')).length;
    const pct = total > 0 ? Math.round(correct / total * 100) : 0;
    const donePct = total > 0 ? Math.round(done / total * 100) : 0;

    masteryHtml += `<div style="margin-bottom:14px;">`;
    masteryHtml += `<div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>${mod.name}</span><span style="color:${mod.color};">${pct}%（完成 ${donePct}%）</span></div>`;
    masteryHtml += `<div style="height:10px;background:var(--bg);border-radius:5px;overflow:hidden;">`;
    masteryHtml += `<div style="height:100%;width:${pct}%;background:${mod.color};border-radius:5px;transition:width 0.5s;"></div>`;
    masteryHtml += `</div></div>`;
  });
  document.getElementById('moduleMastery').innerHTML = masteryHtml;

  // 薄弱环节
  const weakChapters = {};
  QUESTION_BANK.forEach(q => {
    const s = getQStatus(q.id);
    if (s === 'wrong' || s === 'hesitate') {
      const key = `${q.subject} - ${q.chapter}`;
      weakChapters[key] = (weakChapters[key] || 0) + 1;
    }
  });
  const sorted = Object.entries(weakChapters).sort((a, b) => b[1] - a[1]).slice(0, 10);

  let weakHtml = '';
  if (sorted.length === 0) {
    weakHtml = '<p style="color:var(--text2);">暂无数据，开始练习后自动分析薄弱环节。</p>';
  } else {
    sorted.forEach(([key, count]) => {
      const pct = Math.min(100, count * 5);
      weakHtml += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">`;
      weakHtml += `<span style="flex:1;font-size:0.85em;">${key}</span>`;
      weakHtml += `<span style="color:var(--red);font-weight:bold;">${count}题</span>`;
      weakHtml += `<div style="width:100px;height:6px;background:var(--bg);border-radius:3px;"><div style="height:100%;width:${pct}%;background:var(--red);border-radius:3px;"></div></div>`;
      weakHtml += `</div>`;
    });
  }
  document.getElementById('weakAreas').innerHTML = weakHtml;
}

// ===== 面板切换 =====
function switchPanel(panel) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));

  const panelEl = document.getElementById(`panel-${panel}`);
  if (panelEl) panelEl.classList.add('active');
  const navBtn = document.getElementById(`nav-${panel}`);
  if (navBtn) navBtn.classList.add('active');

  if (panel === 'errors') renderErrorBook();
  if (panel === 'stats') renderStats();
  if (panel === 'practice') updateProgressBar();
  if (panel === 'admin') {
    document.getElementById('adminNewTitle').value = getSystemTitle();
    renderAdminUserTable();
    renderBookAdminTable();
  }
  if (panel === 'textbooks') renderBookGrid();
}

// ===== 导出/重置 =====
function exportErrors() {
  const errors = Object.values(appState.errors);
  if (errors.length === 0) { alert('错题本为空，无需导出。'); return; }
  let text = '# 拍卖师考试 · 错题本导出\n\n';
  text += `导出时间：${new Date().toLocaleString('zh-CN')}\n\n`;
  errors.forEach((e, i) => {
    text += `## ${i+1}. ${e.title}\n`;
    text += `- 科目：${e.subject}\n- 章节：${e.chapter}\n- 题型：${e.type}\n- 根因：${e.rootCause}\n- 修正笔记：${e.note}\n- 关联页：${e.relatedPage}\n\n`;
  });
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `拍卖师错题本_${new Date().toISOString().slice(0,10)}.md`;
  a.click(); URL.revokeObjectURL(url);
}

function clearAllErrors() {
  if (confirm('确定要清空所有错题记录吗？此操作不可恢复！')) {
    appState.errors = {};
    saveState();
    renderErrorBook();
    updateProgressBar();
  }
}

async function resetAllProgress() {
  if (confirm('确定要重置所有学习进度吗？（错题本和统计将被保留，仅重置答题状态）')) {
    appState.progress = {};
    shuffleMap = {};
    shuffleReverse = {};
    // 同步清空服务端进度（错题本不受影响）
    try { await api('/api/progress', { method: 'DELETE' }); } catch(e) {}
    applyFilters();
    updateProgressBar();
    alert('✅ 进度已重置（错题本和统计已保留）');
  }
}

// ===== 工具函数 =====
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

// ===== 初始化 =====
function init() {
  applyFilters();
  getSystemTitle().then(t => updateAllTitles(t));
}

// 页面初始加载：先尝试恢复登录，再更新标题
getSystemTitle().then(t => updateAllTitles(t));
tryAutoLogin().then(function() {
  // auto-login 成功则 tryAutoLogin 内部已调 init()
  // 失败则正常显示登录页
});
</script>
